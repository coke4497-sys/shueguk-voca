<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHUEGUK 어휘 · 1~4주 종합 테스트지</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700;800&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Gowun Dodum', -apple-system, BlinkMacSystemFont, sans-serif; background: #e8f4ef; color: #1f3a32; -webkit-text-size-adjust: 100%; }

/* ── 화면용 설정 툴바 ── */
.toolbar { max-width: 900px; margin: 0 auto; padding: 16px 14px; }
.tool-card { background: white; border: 2px solid #c8e4d8; border-radius: 16px; padding: 16px; box-shadow: 0 4px 16px rgba(45,128,104,0.08); }
.tool-card h1 { font-family: 'Nanum Myeongjo', serif; font-size: 18px; font-weight: 800; color: #1f5a48; margin-bottom: 4px; }
.tool-card .desc { font-size: 12px; color: #5a7a70; margin-bottom: 14px; }
.tool-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
.tool-row label.fld { font-size: 12px; font-weight: 700; color: #1f5a48; display: flex; align-items: center; gap: 6px; }
select, input[type=number] { font-family: inherit; font-size: 13px; font-weight: 700; color: #1f3a32; padding: 8px 10px; border: 2px solid #c8e4d8; border-radius: 9px; background: white; outline: none; }
select:focus, input[type=number]:focus { border-color: #5fb8a8; }
input[type=number] { width: 72px; }
.chk { font-size: 12px; font-weight: 700; color: #1f5a48; display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
.chk input { width: 15px; height: 15px; accent-color: #2d8068; }
.btn { font-family: inherit; font-size: 13px; font-weight: 800; border: none; border-radius: 10px; padding: 10px 18px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.btn-primary { background: #2d8068; color: white; }
.btn-ghost { background: #e9f5ef; color: #1f5a48; border: 2px solid #5fb8a8; }
.status { font-size: 12px; color: #5a7a70; margin-top: 4px; }
.status.err { color: #b3362e; font-weight: 700; }

/* ── 시험지 ── */
.sheet { background: white; max-width: 210mm; margin: 14px auto 40px; padding: 14mm 12mm; box-shadow: 0 4px 20px rgba(45,128,104,0.12); }
.paper-head { border: 2.5px solid #1f3a32; padding: 0; margin-bottom: 6mm; }
.paper-head .brand-row { display: flex; align-items: stretch; border-bottom: 2px solid #1f3a32; }
.paper-head .brand { font-family: 'Nanum Myeongjo', serif; font-size: 10px; font-weight: 800; letter-spacing: 4px; padding: 8px 12px; border-right: 2px solid #1f3a32; display: flex; align-items: center; white-space: nowrap; }
.paper-head .title { flex: 1; text-align: center; font-family: 'Nanum Myeongjo', serif; font-size: 17px; font-weight: 800; padding: 8px 10px; letter-spacing: 0.5px; }
.paper-head .grade-chip { padding: 8px 12px; border-left: 2px solid #1f3a32; display: flex; align-items: center; font-weight: 800; font-size: 13px; white-space: nowrap; }
.paper-head .info-row { display: flex; font-size: 11.5px; }
.paper-head .info-cell { flex: 1; padding: 7px 10px; border-right: 1.5px solid #1f3a32; display: flex; gap: 6px; align-items: center; }
.paper-head .info-cell:last-child { border-right: none; }
.paper-head .info-cell b { font-weight: 800; }
.paper-head .write { flex: 1; border-bottom: 1.5px solid #9bb5aa; min-height: 15px; }
.range-note { font-size: 10.5px; color: #3f5a50; margin-bottom: 5mm; line-height: 1.55; padding: 6px 9px; background: #f2f8f5; border: 1px solid #cfe3da; border-radius: 4px; }
.range-note b { font-weight: 800; }

.qwrap { column-count: 2; column-gap: 9mm; column-rule: 1px solid #cfe3da; }
.section-block { break-inside: avoid-column; page-break-inside: avoid; margin-bottom: 4.5mm; }
.section-head { font-size: 11px; font-weight: 800; background: #eef6f2; border: 1.2px solid #9bc5b4; padding: 5px 8px; border-radius: 4px; margin-bottom: 2.5mm; line-height: 1.45; }
.section-head .wk { display: inline-block; font-size: 9px; background: #1f5a48; color: white; border-radius: 3px; padding: 1px 5px; margin-right: 5px; vertical-align: 1px; }
.p-boxki { border: 1.2px dashed #7fae9c; border-radius: 4px; padding: 5px 8px; margin-bottom: 2.5mm; font-size: 10.5px; line-height: 1.6; background: #fbfdfc; }
.p-boxki b { font-weight: 800; margin-right: 5px; }
.q { font-size: 11px; line-height: 1.6; margin-bottom: 3mm; break-inside: avoid-column; page-break-inside: avoid; }
.q .qn { font-weight: 800; margin-right: 4px; }
.q .cho { display: inline-block; border: 1.2px solid #2d8068; color: #1f5a48; border-radius: 4px; padding: 0 6px; font-weight: 800; margin-right: 4px; font-size: 10.5px; }
.q .ex { display: block; color: #4a6a5f; font-size: 10.5px; margin-top: 1.5mm; padding-left: 8px; border-left: 2px solid #cfe3da; }
.q .blankline { display: inline-block; min-width: 22mm; border-bottom: 1.3px solid #1f3a32; height: 12px; vertical-align: -2px; }
.q .writeline { display: block; margin-top: 2mm; }
.q .writeline .lbl { font-size: 10px; color: #6a8a7f; margin-right: 4px; }
.q .opts { margin-top: 1.5mm; }
.q .opt { display: block; padding-left: 4px; margin-top: 0.8mm; }
.q .oxsel { display: inline-block; margin-top: 1.5mm; font-size: 11px; letter-spacing: 1px; color: #3f5a50; }
.q .oxsel span { display: inline-block; border: 1.3px solid #7fae9c; border-radius: 50%; width: 18px; height: 18px; line-height: 16px; text-align: center; font-weight: 800; margin-right: 8px; }

/* ── 정답지 ── */
.answer-sheet { page-break-before: always; }
.ans-title { font-family: 'Nanum Myeongjo', serif; font-size: 15px; font-weight: 800; border: 2px solid #1f3a32; padding: 7px 12px; margin-bottom: 4mm; text-align: center; }
.ans-grid { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 5mm; }
.ans-grid td, .ans-grid th { border: 1.2px solid #1f3a32; padding: 4px 6px; text-align: center; }
.ans-grid th { background: #eef6f2; font-weight: 800; font-size: 10px; }
.ans-grid td.no { font-weight: 800; background: #f7fbf9; width: 9%; }
.expl-list { font-size: 10.5px; line-height: 1.6; column-count: 2; column-gap: 9mm; }
.expl-list .e { margin-bottom: 2mm; break-inside: avoid-column; }
.expl-list .e b { font-weight: 800; }

@media print {
  body { background: white; }
  .toolbar { display: none !important; }
  .sheet { box-shadow: none; margin: 0 auto; padding: 0; max-width: none; }
  @page { size: A4; margin: 13mm 11mm; }
}
@media (max-width: 720px) {
  .qwrap, .expl-list { column-count: 1; }
  .sheet { padding: 16px 14px; }
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="tool-card">
    <h1>슈국 어휘 · 1~4주 종합 테스트지 만들기</h1>
    <div class="desc">학년과 문항 구성을 고른 뒤 [테스트지 만들기] → [인쇄]를 누르세요. 인쇄 화면에서 PDF로 저장할 수도 있습니다.</div>
    <div class="tool-row">
      <label class="fld">학년
        <select id="selGrade">
          <option value="m1">중1</option><option value="m2">중2</option><option value="m3">중3</option>
          <option value="h1" selected>고1</option><option value="h2">고2</option><option value="h3">고3</option>
        </select>
      </label>
      <label class="fld">문항 구성
        <select id="selMode">
          <option value="all">전체 문항 (1~4주 모두)</option>
          <option value="sample">랜덤 추출 (주차별 균등)</option>
        </select>
      </label>
      <label class="fld" id="fldCount" style="display:none;">총 문항 수
        <input type="number" id="inpCount" value="32" min="8" max="64" step="4">
      </label>
      <label class="fld" id="fldSeed" style="display:none;">출제 번호
        <input type="number" id="inpSeed" value="1" min="1" max="9999">
      </label>
    </div>
    <div class="tool-row">
      <label class="chk"><input type="checkbox" id="chkKey" checked> 정답지 포함(별지)</label>
      <label class="chk"><input type="checkbox" id="chkExpl"> 해설 포함</label>
      <button class="btn btn-primary" id="btnBuild">테스트지 만들기</button>
      <button class="btn btn-ghost" id="btnPrint" style="display:none;">인쇄 / PDF 저장</button>
    </div>
    <div class="status" id="status">데이터를 불러오려면 [테스트지 만들기]를 누르세요.</div>
  </div>
</div>

<div class="sheet" id="sheet" style="display:none;"></div>

<script>
(function () {
  'use strict';
  var GRADE_LABEL = { m1: '중1', m2: '중2', m3: '중3', h1: '고1', h2: '고2', h3: '고3' };
  var WEEKS = [1, 2, 3, 4];
  var CIRCLED = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧'];

  var $ = function (id) { return document.getElementById(id); };
  var cache = {};

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }
  function blankify(text) { return esc(text).replace(/___+/g, '<span class="blankline"></span>'); }

  /* 시드 고정 난수 — 같은 출제 번호면 항상 같은 문제지가 나옵니다. */
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function loadWeek(grade, week) {
    var key = grade + '-' + week;
    if (cache[key]) return Promise.resolve(cache[key]);
    return fetch('data/' + key + '.json', { cache: 'no-store' })
      .then(function (r) { if (!r.ok) throw new Error(key + '.json 로드 실패 (' + r.status + ')'); return r.json(); })
      .then(function (d) { cache[key] = d; return d; });
  }

  /* 주차 데이터를 [섹션 → 문항들] 구조로 변환. <보기>는 섹션 단위로 붙습니다. */
  function toSections(weekData) {
    var sections = [];
    var cur = null;
    weekData.questions.forEach(function (q) {
      if (q.section || !cur) {
        var text = (q.section || '')
          .replace(/^\d+\s*~\s*\d+\s*/, '').replace(/^\d+\s+/, '')
          .replace(/누르시오/g, '표시하시오');
        cur = { week: weekData.week, weekTitle: weekData.title, text: text, boxki: q.boxki || null, questions: [] };
        sections.push(cur);
      }
      cur.questions.push(q);
    });
    return sections;
  }

  /* 랜덤 추출: 주차별 균등 배분 → 각 주차 안에서 섹션 비율대로 뽑고, 섹션·문항 순서는 유지 */
  function samplePlan(weekSections, total, rnd) {
    var perWeek = Math.floor(total / WEEKS.length);
    var extra = total - perWeek * WEEKS.length;
    return weekSections.map(function (sections, wi) {
      var want = perWeek + (wi < extra ? 1 : 0);
      var pool = [];
      sections.forEach(function (sec, si) {
        sec.questions.forEach(function (q, qi) { pool.push({ si: si, qi: qi }); });
      });
      want = Math.min(want, pool.length);
      /* Fisher–Yates 후 앞에서 want개 선택 */
      for (var i = pool.length - 1; i > 0; i--) {
        var j = Math.floor(rnd() * (i + 1));
        var t = pool[i]; pool[i] = pool[j]; pool[j] = t;
      }
      var picked = {};
      pool.slice(0, want).forEach(function (p) {
        (picked[p.si] = picked[p.si] || {})[p.qi] = true;
      });
      return sections.map(function (sec, si) {
        if (!picked[si]) return null;
        var qs = sec.questions.filter(function (q, qi) { return picked[si][qi]; });
        return { week: sec.week, weekTitle: sec.weekTitle, text: sec.text, boxki: sec.boxki, questions: qs };
      }).filter(Boolean);
    });
  }

  function renderQuestion(q, num) {
    var h = '<div class="q"><span class="qn">' + String(num).padStart(2, '0') + '.</span>';
    if (q.chosung) h += '<span class="cho">' + esc(q.chosung) + '</span>';
    h += blankify(q.stem);
    if (q.example) h += '<span class="ex">' + blankify(q.example) + '</span>';
    if (q.type === 'choice' && q.options) {
      h += '<span class="opts">' + q.options.map(function (o, i) {
        return '<span class="opt">' + CIRCLED[i] + ' ' + esc(o) + '</span>';
      }).join('') + '</span>';
    } else if (q.type === 'ox') {
      h += '<br><span class="oxsel"><span>O</span><span>X</span></span>';
    } else {
      h += '<span class="writeline"><span class="lbl">답:</span><span class="blankline" style="min-width:34mm;"></span></span>';
    }
    return h + '</div>';
  }

  function answerText(q) {
    if (q.type === 'choice') {
      var n = parseInt(q.answer, 10);
      return n >= 1 && n <= CIRCLED.length ? CIRCLED[n - 1] : esc(q.answer);
    }
    return esc(q.answer);
  }

  function build() {
    var grade = $('selGrade').value;
    var mode = $('selMode').value;
    var total = Math.max(8, Math.min(64, parseInt($('inpCount').value, 10) || 32));
    var seed = parseInt($('inpSeed').value, 10) || 1;
    var withKey = $('chkKey').checked;
    var withExpl = $('chkExpl').checked;

    $('status').className = 'status';
    $('status').textContent = '문제 데이터를 불러오는 중…';
    $('btnBuild').disabled = true;

    Promise.all(WEEKS.map(function (w) { return loadWeek(grade, w); }))
      .then(function (weeks) {
        var weekSections = weeks.map(toSections);
        if (mode === 'sample') {
          weekSections = samplePlan(weekSections, total, mulberry32(seed * 2654435761 % 2147483647));
        }

        var num = 0;
        var flat = [];
        var qHtml = '';
        weekSections.forEach(function (sections) {
          sections.forEach(function (sec) {
            var start = num + 1;
            var body = sec.questions.map(function (q) {
              num++;
              flat.push({ num: num, q: q, week: sec.week });
              return renderQuestion(q, num);
            }).join('');
            var range = start === num ? String(start).padStart(2, '0')
              : String(start).padStart(2, '0') + '~' + String(num).padStart(2, '0');
            qHtml += '<div class="section-block"><div class="section-head"><span class="wk">' + sec.week + '주차</span>'
              + range + ' ' + esc(sec.text) + '</div>'
              + (sec.boxki ? '<div class="p-boxki"><b>&lt;보기&gt;</b>' + sec.boxki.map(esc).join(' &nbsp;/&nbsp; ') + '</div>' : '')
              + body + '</div>';
          });
        });

        var titles = weeks.map(function (w) { return w.week + '주차 ' + w.title; }).join(' · ');
        var head =
          '<div class="paper-head">' +
            '<div class="brand-row"><div class="brand">S H U E G U K</div>' +
            '<div class="title">어휘 1~4주 종합 테스트</div>' +
            '<div class="grade-chip">' + GRADE_LABEL[grade] + '</div></div>' +
            '<div class="info-row">' +
              '<div class="info-cell"><b>이름</b><span class="write"></span></div>' +
              '<div class="info-cell"><b>날짜</b><span class="write"></span></div>' +
              '<div class="info-cell"><b>점수</b><span class="write"></span>/ ' + num + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="range-note"><b>출제 범위</b> ' + esc(titles) +
          (mode === 'sample' ? ' &nbsp;·&nbsp; 총 ' + num + '문항 (출제 번호 ' + seed + ')' : ' &nbsp;·&nbsp; 총 ' + num + '문항') +
          '</div>';

        var html = head + '<div class="qwrap">' + qHtml + '</div>';

        if (withKey) {
          var cols = 8;
          var rows = '';
          for (var i = 0; i < flat.length; i += cols) {
            var slice = flat.slice(i, i + cols);
            rows += '<tr>' + slice.map(function (f) { return '<td class="no">' + f.num + '</td>'; }).join('') + '</tr>';
            rows += '<tr>' + slice.map(function (f) { return '<td>' + answerText(f.q) + '</td>'; }).join('') + '</tr>';
          }
          html += '<div class="answer-sheet">' +
            '<div class="ans-title">정답지 · ' + GRADE_LABEL[grade] + ' 어휘 1~4주 종합 테스트' +
            (mode === 'sample' ? ' (출제 번호 ' + seed + ')' : '') + '</div>' +
            '<table class="ans-grid">' + rows + '</table>';
          if (withExpl) {
            var expl = flat.filter(function (f) { return f.q.explanation; });
            if (expl.length) {
              html += '<div class="ans-title" style="font-size:13px;">해설</div><div class="expl-list">' +
                expl.map(function (f) {
                  return '<div class="e"><b>' + f.num + '.</b> ' + esc(f.q.explanation) + '</div>';
                }).join('') + '</div>';
            }
          }
          html += '</div>';
        }

        $('sheet').innerHTML = html;
        $('sheet').style.display = 'block';
        $('btnPrint').style.display = 'inline-block';
        $('status').textContent = GRADE_LABEL[grade] + ' · 총 ' + num + '문항 준비 완료. [인쇄 / PDF 저장]을 누르세요.';
      })
      .catch(function (e) {
        $('status').className = 'status err';
        $('status').textContent = '오류: ' + e.message + ' — 이 페이지는 서버(예: GitHub Pages)에서 열어야 데이터를 불러올 수 있습니다.';
      })
      .then(function () { $('btnBuild').disabled = false; });
  }

  $('selMode').addEventListener('change', function () {
    var s = this.value === 'sample';
    $('fldCount').style.display = s ? 'flex' : 'none';
    $('fldSeed').style.display = s ? 'flex' : 'none';
  });
  $('btnBuild').addEventListener('click', build);
  $('btnPrint').addEventListener('click', function () { window.print(); });
})();
</script>
</body>
</html>
